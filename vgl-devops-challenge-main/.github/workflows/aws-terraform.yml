name: aws-terraform

on:
  workflow_dispatch:
    inputs:
      frontend_image_tag:
        description: "Frontend image tag to deploy"
        required: true
        default: "latest"
      backend_image_tag:
        description: "Backend image tag to deploy"
        required: true
        default: "latest"
      apply:
        description: "Run terraform apply"
        required: true
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}
  TF_STATE_LOCK_TABLE: ${{ vars.TF_STATE_LOCK_TABLE }}
  AWS_GITHUB_OIDC_ROLE_ARN: ${{ secrets.AWS_GITHUB_OIDC_ROLE_ARN }}
  TF_IN_AUTOMATION: true

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required settings
        run: |
          test -n "$AWS_GITHUB_OIDC_ROLE_ARN" || { echo "::error::Missing secret AWS_GITHUB_OIDC_ROLE_ARN"; exit 1; }
          test -n "$AWS_REGION" || { echo "::error::Missing variable AWS_REGION"; exit 1; }

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: |
          if [ -n "${TF_STATE_BUCKET}" ] && [ -n "${TF_STATE_KEY}" ] && [ -n "${TF_STATE_LOCK_TABLE}" ]; then
            terraform init \
              -backend-config="bucket=${TF_STATE_BUCKET}" \
              -backend-config="key=${TF_STATE_KEY}" \
              -backend-config="region=${AWS_REGION}" \
              -backend-config="dynamodb_table=${TF_STATE_LOCK_TABLE}" \
              -backend-config="encrypt=true"
          else
            terraform init
          fi

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: |
          terraform plan \
            -var="aws_region=${AWS_REGION}" \
            -var="frontend_image_tag=${{ github.event.inputs.frontend_image_tag }}" \
            -var="backend_image_tag=${{ github.event.inputs.backend_image_tag }}"

      - name: Terraform apply
        if: ${{ github.event.inputs.apply == 'true' }}
        run: |
          terraform apply -auto-approve \
            -var="aws_region=${AWS_REGION}" \
            -var="frontend_image_tag=${{ github.event.inputs.frontend_image_tag }}" \
            -var="backend_image_tag=${{ github.event.inputs.backend_image_tag }}"
